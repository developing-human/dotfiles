preload = ~/.config/hypr/wallpaper2.png

wallpaper {
    monitor = eDP-1
    path = ~/.config/hypr/wallpaper2.png
    fit_mode = cover
}

wallpaper {
    monitor = DP-4
    path = ~/.config/hypr/wallpaper2.png
    fit_mode = cover
}

#enable splash text rendering over the wallpaper
splash = false

#fully disable ipc
ipc = off


